version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flambeaux
      POSTGRES_PASSWORD: flambeaux_pass
      POSTGRES_DB: flambeaux_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://flambeaux:flambeaux_pass@db:5432/flambeaux_db"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - db

volumes:
  postgres_data: